spring.application.name=PFE
server.port=8080

# Si la base n'existe pas encore, le connecteur peut la  créer (compte MySQL avec droit CREATE).
spring.datasource.url=jdbc:mysql://localhost:3306/pfedbback?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Europe/Paris
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Fichiers image « carnet numérique » par élève (relatif au répertoire de travail du processus).
app.carnet-numerique.dir=uploads/carnet-numerique
